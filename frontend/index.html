<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Resume Analyzer</title>

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

    <div class="container">

        <h1>AI Resume Analyzer</h1>

        <p>
            Upload your resume and
            analyze your skills.
        </p>

        <hr>

        <h3>Upload Resume</h3>

        <input
            type="file"
            id="resume">

        <br><br>

        <h3>Job Description</h3>

        <textarea
            id="jobDescription"
            rows="10"
            cols="50"
            placeholder="Enter required skills here">
        </textarea>

        <br><br>

        <button id="analyzeBtn">
            Analyze Resume
        </button>

        <hr>

        <div id="result">

            Results will appear here

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
